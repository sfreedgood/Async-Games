name: Setup
description: Check out Node and install workspace dependencies

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - run: npm ci --legacy-peer-deps
      shell: bash
    # GameTracker tests (tracker.spec.ts) drive real git via simple-git, which
    # needs an author identity or commits fail with "Author identity unknown".
    - run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
      shell: bash
