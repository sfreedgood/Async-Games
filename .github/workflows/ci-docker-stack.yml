name: Build and Test Docker Stack

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docker-stack:
    runs-on: ubuntu-latest
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_GITHUB_ASYNC_GAMES }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres  # or your password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for CI
        run: |
          cat <<EOF > .env
          DB_HOST=localhost
          DB_PORT=5432
          DB_USERNAME=${{ secrets.DB_USERNAME || 'async_games_dev' }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD || 'change_me' }}
          DB_NAME=${{ secrets.DB_NAME || 'async_games' }}
          DB_LOGGING=false
          DB_SSL=false
          DB_SYNCHRONIZE=true
          NODE_ENV=production
          EOF

      - name: Build backend
        run: npx nx build async-games-backend --configuration=production

      - name: Run backend tests
        run: npx nx test async-games-backend

      - name: Run backend linting
        run: npx nx lint async-games-backend

      - name: Build Docker images
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME || 'async_games_dev' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'change_me' }}
          DB_NAME: ${{ secrets.DB_NAME || 'async_games' }}
          DB_HOST: localhost
          DB_PORT: 5432
          # Don't use a file, rely on build args from secrets
          DB_ENV_FILE: .env.nonexistent
        run: |
          docker build -t async-games-backend:latest -f Dockerfile .
          docker build -t async-games-db:latest -f docker/db/Dockerfile \
            --build-arg DB_USERNAME="$DB_USERNAME" \
            --build-arg DB_PASSWORD="$DB_PASSWORD" \
            --build-arg DB_NAME="$DB_NAME" \
            --build-arg DB_HOST="$DB_HOST" \
            --build-arg DB_PORT="$DB_PORT" \
            .

      - name: Run E2E tests
        run: npx nx e2e async-games-backend-e2e
