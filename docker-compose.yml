services:
  nestjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-async_games_dev}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-async_games}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nest-network

  postgres:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
      args:
        DB_ENV_FILE: ${DB_ENV_FILE:-.env.development}
        POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
        POSTGRES_PASSWORD: ${POSTGRES_SUPERPASS:-postgres}
    image: async-games/postgres:local
    container_name: async_games
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASS:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nest-network
volumes:
  postgres-data:

networks:
  nest-network:
